name: Check code

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.1
        with:
          packages: >-
            clang llvm cmake pkg-config libbpf-dev libyaml-dev libc6-dev build-essential libxdp-dev
            libssl-dev libmosquitto-dev bash sphinx python3-sphinx-rtd-theme clang-tidy clang-format
            reuse libcmocka-dev
          version: 1.0

      - name: Check code
        run: ./tools/ci/qa.sh
